# Reverse proxy nginx -> Node app (container "app" di docker-compose)
upstream stock_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Gzip biar response JSON screener (~ratusan KB) lebih ringan
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/x-javascript
        image/svg+xml;

    # Limit body size (POST portfolio analyze)
    client_max_body_size 2M;

    # Static assets (HTML, CSS, JS) — boleh aja diserve langsung,
    # tapi gampangnya biar Express yang handle (ada cache control disana)
    location /api/ {
        proxy_pass http://stock_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Screener scan butuh ~60 detik untuk 200 saham
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffer kecil supaya streaming response cepet
        proxy_buffering off;
    }

    # Semua selain /api/ (HTML, CSS, JS, dll) juga ke Node, biar konsisten
    location / {
        proxy_pass http://stock_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Healthcheck endpoint nginx
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
